<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VSign Detect — Control Panel</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">✌ <span>VSign Detect</span> <em>control panel</em></div>
    <div class="top-actions">
      <span id="status" class="status">loading model…</span>
      <button id="enableBtn" class="btn">Enable cameras</button>
      <label class="relay-toggle" title="Fire the Arduino relay via the bridge">
        <input type="checkbox" id="driveRelay" disabled />
        <span>Drive relay</span>
        <span id="relayStatus" class="relay-dot" data-state="na"></span>
      </label>
      <div id="globalTrigger" class="global-trigger">TRIGGER</div>
    </div>
  </header>

  <main class="zones">
    <!-- Zone template is cloned per zone in app.js -->
  </main>

  <section class="config-out">
    <div class="config-head">
      <h2>config.yaml (current settings)</h2>
      <button id="copyCfg" class="btn btn-sm">Copy</button>
    </div>
    <pre id="configYaml" class="yaml"></pre>
    <p class="hint">These map 1:1 to the Python engine's
      <code>config/config.yaml</code>. Tune here, then paste into the engine that
      drives the relay.</p>
  </section>

  <section class="log-wrap">
    <h2>Trigger log</h2>
    <ul id="log" class="log"></ul>
  </section>

  <!-- One zone's markup, cloned for A and B -->
  <template id="zoneTemplate">
    <div class="zone card">
      <div class="zone-head">
        <h2 class="zone-title">Zone <span class="zname"></span></h2>
        <div class="zone-state">
          <span class="badge idle">idle</span>
          <span class="fps">– fps</span>
        </div>
      </div>

      <div class="stage">
        <video class="video" autoplay playsinline muted></video>
        <canvas class="overlay"></canvas>
        <div class="zone-trigger">✌ FIRE</div>
        <div class="conf-wrap"><div class="conf-bar"></div></div>
      </div>

      <div class="controls">
        <label class="ctrl wide">
          <span>Camera</span>
          <select class="camSelect"></select>
        </label>

        <label class="ctrl">
          <span>Min score <b class="v-minScore"></b></span>
          <input type="range" class="minScore" min="0" max="1" step="0.01" />
        </label>

        <label class="ctrl">
          <span>Hold (ms) <b class="v-holdMs"></b></span>
          <input type="range" class="holdMs" min="0" max="1500" step="10" />
        </label>

        <label class="ctrl">
          <span>Cooldown (s) <b class="v-cooldownS"></b></span>
          <input type="range" class="cooldownS" min="0" max="10" step="0.1" />
        </label>

        <label class="ctrl">
          <span>Release (ms) <b class="v-releaseMs"></b></span>
          <input type="range" class="releaseMs" min="0" max="1000" step="10" />
        </label>
      </div>
    </div>
  </template>

  <script type="module" src="app.js"></script>
</body>
</html>
